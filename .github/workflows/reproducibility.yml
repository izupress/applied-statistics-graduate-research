name: Reproducibility coordination

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  coordinate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate chapter manifest
        run: python code/Python/generate_chapter_manifest.py

      - name: Run Chapter 21 audit workflow
        run: python code/Python/chapter21_audit_workflows.py

      - name: Run companion reproducibility audit
        run: python code/Python/run_reproducibility_audit.py --timeout 180

